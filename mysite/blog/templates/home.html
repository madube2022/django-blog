{% extends 'base.html' %}

{% block content %}

<h2>Homepage</h2>

{% if posts %}
    {% for post in posts %}
        <div class="post">
            <h2>{{ post.title }}</h2>
            <p>{{ post.content|truncatewords:15|safe }}</p>
            <a href="/post/{{ post.id }}/" class="read-more">Read More →</a>
        </div>
    {% endfor %}
{% else %}
    <p>No posts yet.</p>
{% endif %}

{% endblock %}
