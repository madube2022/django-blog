{% extends 'base.html' %}

{% block content %}

<h2>Login</h2>

{% if form.errors %}
    <p style="color:red;">Invalid username or password.</p>
{% endif %}

<form method="POST">
    {% csrf_token %}

    <label>Username:</label><br>
    {{ form.username }}<br><br>

    <label>Password:</label><br>
    {{ form.password }}<br><br>

    <button type="submit">Login</button>
</form>

<p>
    Don't have an account?
    <a href="{% url 'signup' %}">Sign up here</a>
</p>

{% endblock %}
