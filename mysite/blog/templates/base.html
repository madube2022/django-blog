<!DOCTYPE html>
<html>
<head>
    <title>My Health Blog</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
    
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h1>
        <a href="/" style="color:white; text-decoration:none;">
            My Health Blog
        </a>
    </h1>
    <ul>
        <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/about/">About Us</a></li>
    <li><a href="/contact/">Contact</a></li>

    {% if user.is_authenticated %}
        <li>Welcome, {{ user.username }}</li>
        <li>
    <form action="{% url 'logout' %}" method="POST" style="display:inline;">
        {% csrf_token %}
        <button style="background:none; border:none; color:white; font-weight:bold; cursor:pointer;">Logout
        </button>
    </form>
</li>
    {% else %}
        <li><a href="{% url 'login' %}">Login</a></li>
        <li><a href="{% url 'signup' %}">Sign Up</a></li>
    {% endif %}
</ul>
    </ul>
</nav>

<!-- CONTENT BLOCK -->
<div class="container">
    {% block content %}
    {% endblock %}
</div>

<!-- FOOTER -->
<footer class="footer">
    <p>© 2026 My Health Blog</p>
</footer>

</body>
</html>
